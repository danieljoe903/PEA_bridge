{% extends "app_base.html" %}
{% block title %}Edit Property | PEA-bridge{% endblock %}

{% block content %}
<div class="container-fluid">
  <h3 class="text-white mb-3">Edit Property</h3>

  <form method="post" class="card p-3" style="background:#0f172a;border:none;border-radius:14px;color:white;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input class="form-control" name="title" value="{{ prop.property_title or '' }}" required>
    </div>

      <div class="mb-3">
      <label class="form-label">Type</label>
      <select class="form-control" name="type">
        {% for t in ["house","apartment","land","commercial"] %}
          <option value="{{ t }}" {% if prop.property_type == t %}selected{% endif %}>
            {{ t|capitalize }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <textarea class="form-control" name="address" required>{{ prop.adress }}</textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" type="number" name="price" value="{{ prop.price or '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">states</label>
      <input class="form-control" type="text" name="state" value="{{ prop.state.state_name if prop.state else '' }}">
    </div>


    <div class="mb-3">
      <label class="form-label">Status</label>
      <select class="form-control" name="status">
    {% for s in ["available","under_verification","sold","rented"] %}
        <option value="{{ s }}"{% if prop.property_status ==s  %}selected{% endif %}>
        {{ s|replace("_"," ")|title }}
        </option>
    {% endfor %}
</select>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-success fw-bold">Save</button>
      <a href="{{ url_for('property.view_property', property_id=prop.property_id) }}" class="btn btn-outline-light">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}


{% block scripts %}
      <script>
            setTimeout(function(){
        document.querySelectorAll('.auto-dismiss').forEach(function(alert){
          let bsAlert =new bootstrap.Alert(alert);
          bsAlert.close();
        });
      }, 3000);

      
 </script>

 {% endblock %}
