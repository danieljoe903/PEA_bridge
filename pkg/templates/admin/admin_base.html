<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Admin | PEA_bridge{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --navH: 70px;
      --sideW: 260px;
      --bg: #0b1320;
      --panel: #020617;
    }

    body{ background:var(--bg); padding-top:var(--navH); overflow-x:hidden; }
    .topbar{ background:var(--panel); }

    .sidebar{
      background:var(--panel);
      width:var(--sideW);
    }
    .sidebar .nav-link{ color:#e5e7eb; font-weight:600; }
    .sidebar .nav-link.active, .sidebar .nav-link:hover{ color:#84cc16; }

    .content{ min-height:calc(100vh - var(--navH)); }
    .card{ background:#0f172a; border:none; border-radius:14px; color:white; }

    /* Desktop layout */
    @media (min-width:768px){
      .sidebar-desktop{
        position:fixed;
        top:var(--navH);
        left:0;
        width:var(--sideW);
        height:calc(100vh - var(--navH));
        overflow-y:auto;
        z-index: 1020;
      }
      .page-wrap{
        padding-left: var(--sideW);
      }
      main{
        margin-left:0 !important;
      }
    }
  </style>
</head>

<body>

<!-- Topbar -->
<nav class="navbar navbar-dark topbar fixed-top" style="height:70px;">
  <div class="container-fluid">
    <!-- Mobile toggle -->
    <button class="btn btn-sm btn-outline-light d-md-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#adminSidebar">
      ☰
    </button>

    <span class="navbar-brand fw-bold">
      <span class="text-warning">&lt;/&gt;</span> PEA_bridge <span class="text-white-50">Admin</span>
    </span>

    <div class="d-flex align-items-center gap-2">
      <span class="text-white-50 small">Admin</span>
      <a href="{{url_for('admin.admin_logout')}}" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
  </div>
</nav>

<!-- ✅ Desktop Sidebar (VISIBLE on md+) -->
<aside class="sidebar sidebar-desktop d-none d-md-block p-3">
  {% include "admin/sidebar.html" %}
</aside>

<!-- ✅ Mobile Sidebar (OFFCANVAS only on small screens) -->
<div class="offcanvas offcanvas-start sidebar text-white d-md-none"
     tabindex="-1"
     id="adminSidebar">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Admin Menu</h5>
    <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body p-3">
    {% include "admin/sidebar.html" %}
  </div>
</div>

<!-- Main Content -->
 <div class="page-wrap">
<div class="container-fluid px-0">
  <div class="row">
    <main class="content col-12 px-4 py-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
