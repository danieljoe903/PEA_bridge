{% extends "app.html" %}
{% block title %}500 | Server Error{% endblock %}

{% block content %}
<section class="hero" style="min-height:100vh;">
  <div class="container text-center text-white">
    <div class="glass p-5 mx-auto" style="max-width:700px;">
      <h2 class="fw-bold mb-3 display-1 text-danger">Internal Server Error</h2>
      <p class="text-muted mb-4">
        Something went wrong on our side. Please try again in a moment.
      </p>

      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="{{ url_for('main.homepage') }}" class="btn btn-brand px-4">
          Go Home
        </a>

        <a href="javascript:location.reload()" class="btn btn-outline-light px-4">
          Try Again
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
