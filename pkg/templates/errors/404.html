{% extends "app.html" %}
{% block title %}404 | Page Not Found{% endblock %}

{% block content %}
<section class="hero" style="min-height:100vh;">
  <div class="container text-center text-white">
    <div class="glass p-5 mx-auto" style="max-width:700px;">
     
      <h2 class="fw-bold mb-3 brand display-1">Page Not Found</h2>
      <p class="text-muted mb-4">
        Sorry, the page you are looking for does not exist or may have been moved.
      </p>

      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="{{ url_for('main.homepage') }}" class="btn btn-brand px-4">
          Go Home
        </a>

        <a href="javascript:history.back()" class="btn btn-outline-light px-4">
          Go Back
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
